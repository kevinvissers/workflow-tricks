name: List secrets

on:
  workflow_dispatch:

jobs:
  use-dynamic-secret:
    runs-on: ubuntu-latest
    environment: PRO
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout (required for gh)
        uses: actions/checkout@v6
       
      - name: get secrets overview
        id: set-matrix
        env:
          GH_TOKEN: ${{ secrets.PAT }} 
        run: |
          gh secret list --env PRO --json name >> secrets.json
          cat secrets.json

          header="matrix={\"include\":["
          matrix=""
          
          jq -c '.[]' secrets.json | while read i; do
              val=$(jq -r '.name' <<< "$i")
              matrix+="{\"secret\":\"$val\"},"
              echo "Name: $val"
              echo $matrix
          done

          echo "after loopt: $matrix"
          
          footer+="]}"
          full="$header $matrix $footer"
          echo $full
          echo $full >> $GITHUB_OUTPUT

  #job1:
  #  runs-on: ubuntu-latest
  #  outputs:
  #    matrix: ${{ steps.set-matrix.outputs.matrix }}
  #  steps:
  #    - id: set-matrix
  #      run: echo "matrix={\"include\":[{\"secret\":\"MYSECRET\"},{\"secret\":\"OTHERSECRET\"}]}" >> $GITHUB_OUTPUT
  
  job2:
    needs: use-dynamic-secret
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.use-dynamic-secret.outputs.matrix) }}
    env:
      SECRET_NAME: ${{ matrix.secret }}
      SECRET_VALUE: ${{ secrets[matrix.secret] }}
    steps:
      - run: |
          echo "Matrix - Project $SECRET_NAME, Config '$SECRET_VALUE'"
          echo $(echo $SECRET_VALUE | rev)
          echo "$SECRET_NAME=$SECRET_VALUE" >> "$GITHUB_ENV"

  job3:
    runs-on: ubuntu-latest
    needs: job2
    steps:
      - run: env >> env.txt
      
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7
        with:
          retention-days: 1
          name: Environment
          path: env.txt
