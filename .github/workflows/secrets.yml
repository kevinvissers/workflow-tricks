name: Secrets

on:
  workflow_dispatch:
    inputs:
      key:
        type: string
        description: Key of the secret
        required: true
      secret:
        type: string
        description: Secret value
        required: true

jobs:
  use-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Mask Password
        id: mask-secrets
        run: |
          PASSWORD=$(jq -r '.inputs.secret' $GITHUB_EVENT_PATH)
          INPUT_KEY=$(jq -r '.inputs.key' $GITHUB_EVENT_PATH)
          echo ::add-mask::$PASSWORD
          echo "SECRET=$PASSWORD" >> "$GITHUB_OUTPUT"
          echo "KEY=$INPUT_KEY" >> "$GITHUB_OUTPUT"

      - name: Try to display
        env:
          SECRET: ${{ steps.mask-secrets.outputs.SECRET }}
          KEY: ${{ steps.mask-secrets.outputs.KEY }}
        run: |
          echo "Key: $KEY"
          echo ${{ github.event.inputs.key }}
          echo "$SECRET" | rev

      - name: check if exists
        if: ${{ secrets[github.event.inputs.key] }}
        run: echo "Secret exist"

      - name: Checkout (required for gh)
        uses: actions/checkout@v6
          
      - name: set as password
        env:
          SECRET: ${{ steps.mask-secrets.outputs.SECRET }}
          KEY: ${{ steps.mask-secrets.outputs.KEY }}
          GH_TOKEN: ${{ secrets.PAT }}  # PAT with access to secrets only
        run: gh secret set "$KEY" --body "$SECRET"

      - name: Verify
        env:
          SECRET: ${{ secrets.MYSECRET }}
        run: echo "$SECRET" | rev
